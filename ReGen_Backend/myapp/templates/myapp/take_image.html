{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReGen</title>
    <link rel="stylesheet" href="{% static 'myapp/css/style.css' %}">
    <link rel="icon" type="image/jpg" href="{% static 'myapp/images/logo.png' %}">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <a><img src="{% static 'myapp/images/logo.png' %}" alt="Logo"></a>
        </div>
        <ul>
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'choice' %}">Recipe Generator</a></li>
        </ul>
    </nav>

    <div class="parallax-background2"></div>
    <section class="button_container">

        <div class="button_div">
            <button id="start-video-btn">Start Camera</button>
            <button id="take-photo-btn" style="display: none;">Take Picture</button>
            <button id="retake-photo-btn" style="display: none;"> Retake Picture </button>
            <input type="file" id="upload-image" accept="image/*">  
            <br>
            <a>
                <button id="gen"> GENERATE! </button>
            </a>
        </div>

        <div class="vid_container"> 
            <video id="video" width="640" height="480" autoplay></video>
            <canvas id="canvas"></canvas>
        </div>
    </section> 


    <script src="{% static '/myapp/js/index.js' %}"></script>
    
</body>
</html>
